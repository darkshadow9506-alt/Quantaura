# ============================================================
#  QuantAura — strategy & universe configuration
#  Every number here is a deliberate, documented choice grounded
#  in published quant practice (see README "Methodology").
#  Change these to tune the system; nothing is hard-coded in logic.
# ============================================================

# --- Tradable universe -------------------------------------------------
# Each asset class is fetched from the correct data source automatically.
# Symbols must be valid for their provider (yfinance / ccxt).
universe:
  stocks:        # US equities & ETFs (yfinance tickers)
    - AAPL
    - MSFT
    - NVDA
    - AMZN
    - GOOGL
    - META
    - TSLA
    - SPY
    - QQQ
  forex:         # FX majors (yfinance "=X" tickers)
    - EURUSD=X
    - GBPUSD=X
    - USDJPY=X
    - AUDUSD=X
    - USDCAD=X
  crypto:        # ccxt unified symbols (BASE/QUOTE)
    - BTC/USDT
    - ETH/USDT
    - SOL/USDT
    - BNB/USDT
    - XRP/USDT

# --- Data ------------------------------------------------------------
data:
  timeframe: "1d"        # 1d = daily (the horizon where retail quant edges are real)
  lookback_bars: 1250    # ~5y of daily bars: enough for 200-MA + a real backtest sample
  cache_minutes: 30      # re-use cached OHLCV for this long to avoid rate limits

# --- Regime filter ----------------------------------------------------
# Decides whether a symbol is trending (use momentum) or ranging
# (use mean reversion). Prevents the two engines from fighting.
regime:
  adx_period: 14
  adx_trend_threshold: 25     # ADX >= 25 -> trending; < 20 -> ranging
  adx_range_threshold: 20

# --- Structure-aware targets -----------------------------------------
# Pull take-profit in to just before a significant swing level (support
# for shorts, resistance for longs) so the order fills BEFORE price can
# reverse off that level — instead of a blind R-multiple that might land
# just beyond a key level. Applies to the momentum/breakout strategies
# (and is used in the backtest too, so the stats stay consistent).
structure:
  enabled: true
  swing_width: 3          # bars on each side that define a pivot high/low
  buffer_atr: 0.25        # place stop/target this far (in ATR) beyond/before the level
  lookback: 120           # only consider levels within this many bars
  min_rr: 0.8             # if refining the target drops reward:risk below this, keep R-multiple
  # Structural stop: place the stop just beyond the nearest protective level
  # (swing high/low, FVG edge, or order block) instead of a blind ATR stop.
  # The structural risk is capped to [stop_min_atr, stop_max_atr] x ATR.
  structural_stop: true
  stop_min_atr: 0.8       # if the level is closer than this (in ATR), keep the ATR stop
  stop_max_atr: 4.0       # if the level is farther than this, keep the ATR stop

# --- Strategy: Trend / Time-Series Momentum --------------------------
# Donchian-channel breakout with a long-term moving-average filter.
# This is the classic trend-following edge run by CTAs (Man AHL, etc.).
trend:
  enabled: true
  donchian_entry: 20      # breakout of 20-bar high/low triggers entry
  donchian_exit: 10       # opposite 10-bar channel is the trailing exit
  ma_fast: 50
  ma_slow: 200            # only long above 200MA, only short below it
  atr_period: 14
  atr_stop_mult: 2.5      # initial stop = entry -/+ 2.5*ATR
  min_target_R: 2.0       # take-profit at >= 2R (reward:risk)

# --- Strategy: Mean Reversion ----------------------------------------
# Short-horizon overreaction reversal. Bollinger/z-score + RSI-2,
# only taken WITH the long-term trend (buy dips in uptrends).
mean_reversion:
  enabled: true
  bb_period: 20
  bb_std: 2.0
  zscore_entry: 2.0       # |z| >= 2 = stretched away from the mean
  rsi_period: 2           # Connors RSI-2: classic short-term MR filter
  rsi_buy_below: 10
  rsi_sell_above: 90
  ma_trend: 200           # regime/trend filter for direction
  atr_period: 14
  atr_stop_mult: 3.0
  target: "mean"          # target = the moving-average (reversion to mean)

# --- Strategy: MACD trend ---------------------------------------------
# MACD signal-line crossover, filtered by the 200-MA. Classic momentum.
macd:
  enabled: true
  fast: 12
  slow: 26
  signal: 9
  ma_slow: 200
  atr_period: 14
  atr_stop_mult: 2.5
  min_target_R: 2.0

# --- Strategy: Dual Thrust (Michael Chalek) --------------------------
# Range = max(HH-LC, HC-LL) over prior N bars; break Open±K*Range.
dual_thrust:
  enabled: true
  range_bars: 4
  k1: 0.5                 # upper-band sensitivity (long)
  k2: 0.5                 # lower-band sensitivity (short)
  trend_filter: true      # only take breakouts aligned with the 200-MA
  ma_slow: 200
  atr_period: 14
  atr_stop_mult: 2.0
  min_target_R: 2.0

# --- Strategy: TTM Squeeze breakout (John Carter) --------------------
# Bollinger inside Keltner = volatility squeeze; trade the release.
squeeze:
  enabled: true
  bb_period: 20
  bb_std: 2.0
  kc_ema: 20
  kc_atr: 10
  kc_mult: 1.5
  ma_slow: 200
  atr_period: 14
  atr_stop_mult: 1.5      # tight stop: volatility was compressed
  min_target_R: 3.0       # wider target: expect a vol expansion move

# --- Strategy: Statistical Arbitrage / Pairs -------------------------
# Engle-Granger cointegration + z-score of the spread (Ornstein-Uhlenbeck
# style reversion). Trades the relative value of two correlated assets.
pairs:
  enabled: true
  lookback: 252           # ~1y of daily bars to estimate the relationship
  coint_pvalue_max: 0.05  # only trade statistically cointegrated pairs
  zscore_entry: 2.0
  zscore_exit: 0.5
  zscore_stop: 3.5        # structural-break stop
  candidates:             # pre-screened economically-related pairs
    - [KO, PEP]
    - [MSFT, AAPL]
    - [GLD, SLV]
    - [XOM, CVX]
    - [V, MA]

# --- Strategy: Cross-sectional Momentum (the academic 'momentum factor')
# Jegadeesh-Titman (1993) / AQR: rank a universe by trailing 12-1 month
# return, go long the strongest, short the weakest. Validated by a panel
# (long-short basket) backtest, not a per-symbol one.
factor_momentum:
  enabled: true
  lookback_days: 126      # ~6 months of trailing return
  skip_days: 21           # skip the most recent month (avoids ST reversal)
  rebalance_days: 21      # monthly rebalance in the backtest
  top_n: 2                # go long the N strongest names per asset class
  bottom_n: 2             # go short the N weakest (set 0 to disable shorts)
  allow_short: true
  atr_period: 14
  atr_stop_mult: 3.0
  min_target_R: 2.0
  min_basket_rebalances: 24   # gate: need a real sample of rebalances
  min_basket_winrate: 0.45
  min_basket_profit_factor: 1.15

# --- Strategy: Machine Learning (gradient boosting) ------------------
# Supervised learning on engineered features, predicting the triple-
# barrier label (will price hit +k·ATR before -k·ATR within horizon).
# Trained with PURGED walk-forward (no leakage). Heavier to compute, so
# it has its own /ml command and is not part of the default /scan.
ml:
  enabled: true
  horizon: 10            # forward bars for the barrier label
  k: 1.5                 # barrier width in ATR units (= TP/SL distance)
  min_train: 250         # minimum bars before the model will trade
  refit_every: 42        # refit cadence (bars) in the walk-forward backtest
  prob_threshold: 0.58   # only act when P(up) >= this (or P(down) >= this)
  max_iter: 200          # gradient-boosting trees
  max_depth: 3
  learning_rate: 0.05

# --- Journal / live tracking -----------------------------------------
# The bot records every published signal to a local SQLite database so it
# can deduplicate, track real outcomes (TP/SL), and report a live record.
journal:
  enabled: true
  db_path: ""             # blank -> quantaura_state.db in the project root
  cooldown_days: 3        # don't re-publish same symbol+strategy+side within this
  max_hold_days: 30       # expire still-open signals after this many days

# --- Scheduler --------------------------------------------------------
# How often the bot auto-runs: resolve the journal, push danger alerts,
# scan for new gated signals, and broadcast to subscribers.
# Note: signals are based on DAILY bars (one close/day), so new signals
# change at most once a day — but a shorter interval makes the danger /
# management alerts react faster to intraday moves.
schedule:
  scan_interval_hours: 1

# --- Active trade management (advice for OPEN positions) -------------
# Drives /manage and the scheduled danger alerts. Pure advice — the bot
# never places or closes orders; you act on Toobit yourself.
manage:
  breakeven_R: 1.0        # at +1R: take partial profit and move stop to breakeven
  trail_atr_mult: 3.0     # then trail the stop at (extreme -/+ this x ATR)
  near_target_atr: 0.5    # flag "near target" within this many ATR of the TP
  tp_buffer_atr: 0.25     # take profit this far (in ATR) before a level ahead
  danger_on_ma_break: true   # warn if price closes back across the 200-MA
  danger_on_macd_flip: true  # warn if MACD momentum flips against the position

# --- Risk management --------------------------------------------------
risk:
  risk_per_trade_pct: 1.0     # risk 1% of equity per trade (fixed-fractional)
  kelly_fraction: 0.5         # use HALF-Kelly on the backtested edge (safer)
  max_kelly_pct: 5.0          # never size above 5% of equity on one idea
  max_open_per_class: 5       # concurrency cap suggestion per asset class
  portfolio_max_risk_pct: 6.0 # warn if total risk-at-stop across signals exceeds this
  # --- Trailing stop (Chandelier exit) ---
  # When enabled, the backtester trails the stop at (extreme - mult·ATR)
  # so winners can run past the fixed target. Each signal also carries a
  # management note describing the trail for live use.
  use_trailing_stop: true
  trail_atr_mult: 3.0         # chandelier distance in ATR units

# --- Signal gating ----------------------------------------------------
# A raw strategy trigger is only PUBLISHED as a signal if its own
# historical backtest on that symbol clears these bars. This is how we
# refuse to emit "made-up" signals: every signal is backtest-validated.
signal_gate:
  min_backtest_trades: 15     # need a meaningful sample
  min_win_rate: 0.40
  min_profit_factor: 1.15
  min_sharpe: 0.3       # significance score (mean/std·√N), not annualized Sharpe
  # --- Monte Carlo robustness ---
  min_prob_profitable: 0.60   # bootstrap P(edge profitable forward) must clear this
  ruin_R: 10.0                # "ruin" = a 10R (≈10%) drawdown at 1% risk/trade
  mc_max_bars: 60             # horizon for the P(TP before SL) simulation
  # --- Walk-forward (out-of-sample) ---
  oos_split: 0.7              # train on first 70% of trades, validate on last 30%
  oos_min_trades: 4           # only enforce the OOS check with enough holdout trades
  oos_min_expectancy_R: 0.0   # out-of-sample expectancy must stay positive
